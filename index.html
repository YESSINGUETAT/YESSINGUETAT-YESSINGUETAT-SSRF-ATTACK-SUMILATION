<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Interactif SSRF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .console { font-family: 'Fira Code', monospace; }
        .bg-pattern { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8 bg-pattern">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        
        <!-- Header -->
        <div class="bg-slate-900 text-white p-6 border-b border-slate-800">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                Laboratoire SSRF (Server-Side Request Forgery)
            </h1>
            <p class="text-slate-400 mt-2 text-sm">Testez comment un serveur gère les requêtes sortantes lorsqu'il est vulnérable ou sécurisé.</p>
        </div>

        <div class="p-6 md:p-8 grid md:grid-cols-2 gap-8">
            
            <!-- Controls Section -->
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">1. Choisissez un vecteur d'attaque</label>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="fillUrl('https://api.github.com/users/octocat')" class="text-left px-4 py-2 text-sm bg-slate-100 hover:bg-slate-200 rounded-lg border border-slate-300 transition-colors">
                            🌐 Site externe (Légitime)
                        </button>
                        <button onclick="fillUrl('http://127.0.0.1/admin/database')" class="text-left px-4 py-2 text-sm bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-200 rounded-lg transition-colors">
                            🏠 Interface d'administration locale
                        </button>
                        <button onclick="fillUrl('http://169.254.169.254/latest/meta-data/iam/security-credentials/')" class="text-left px-4 py-2 text-sm bg-orange-50 hover:bg-orange-100 text-orange-700 border border-orange-200 rounded-lg transition-colors">
                            ☁️ Métadonnées Cloud (AWS/GCP)
                        </button>
                        <button onclick="fillUrl('file:///etc/passwd')" class="text-left px-4 py-2 text-sm bg-purple-50 hover:bg-purple-100 text-purple-700 border border-purple-200 rounded-lg transition-colors">
                            📁 Lecture de fichier local
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">2. URL à faire visiter par le serveur</label>
                    <input type="text" id="targetUrl" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm" placeholder="http://...">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">3. Exécuter la requête côté serveur</label>
                    <div class="flex gap-3">
                        <button onclick="executeFetch('vulnerable')" class="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 px-4 rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2">
                            <span>Serveur Vulnérable</span>
                        </button>
                        <button onclick="executeFetch('secure')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2">
                            <span>Serveur Sécurisé</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Terminal Output Section -->
            <div class="bg-slate-900 rounded-xl flex flex-col shadow-inner overflow-hidden border border-slate-700">
                <div class="bg-slate-800 px-4 py-2 flex items-center gap-2 border-b border-slate-700">
                    <div class="w-3 h-3 rounded-full bg-rose-500"></div>
                    <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                    <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                    <span class="text-xs text-slate-400 font-mono ml-2">backend-terminal.log</span>
                </div>
                <div id="consoleOutput" class="console p-4 text-sm text-slate-300 flex-1 overflow-y-auto whitespace-pre-wrap h-80">En attente d'une requête...</div>
            </div>

        </div>
    </div>

    <script>
        function fillUrl(url) {
            document.getElementById('targetUrl').value = url;
            // Clear terminal on new selection
            document.getElementById('consoleOutput').innerHTML = "Prêt à exécuter la requête vers : \n<span class='text-blue-400'>" + url + "</span>";
        }

        function executeFetch(mode) {
            const urlInput = document.getElementById('targetUrl').value.trim();
            const output = document.getElementById('consoleOutput');
            
            if (!urlInput) {
                output.innerHTML = "<span class='text-amber-400'>[Avertissement] Veuillez entrer une URL.</span>";
                return;
            }

            output.innerHTML = `[Backend] Initialisation de la requête (Mode : ${mode === 'vulnerable' ? 'Vulnérable' : 'Sécurisé'})...\n`;
            output.innerHTML += `[Backend] Fetching <span class='text-blue-400'>${urlInput}</span> ...\n\n`;

            // Simulating network delay
            setTimeout(() => {
                if (mode === 'vulnerable') {
                    simulateVulnerableBackend(urlInput, output);
                } else {
                    simulateSecureBackend(urlInput, output);
                }
            }, 800);
        }

        // --- MOCK BACKENDS --- //

        function simulateVulnerableBackend(url, output) {
            // Le serveur vulnérable prend l'URL et l'exécute aveuglément.
            if (url.includes('127.0.0.1') || url.includes('localhost')) {
                output.innerHTML += `<span class="text-emerald-400">HTTP/1.1 200 OK</span>\n\n`;
                output.innerHTML += `<span class="text-white">{
  "status": "success",
  "app": "Internal Admin Panel",
  "db_credentials": {
    "user": "root",
    "password": "super_secret_db_password_123!"
  }
}</span>`;
            } 
            else if (url.includes('169.254.169.254')) {
                output.innerHTML += `<span class="text-emerald-400">HTTP/1.1 200 OK</span>\n\n`;
                output.innerHTML += `<span class="text-white">{"AccessKeyId":"AKIAIOSFODNN7EXAMPLE",
"SecretAccessKey":"wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY",
"Token":"IQoJb3JpZ2luX2VjEJv...",
"Expiration":"2026-03-03T14:00:00Z"}</span>`;
            }
            else if (url.startsWith('file://')) {
                output.innerHTML += `<span class="text-emerald-400">FILE SYSTEM ACCESSED</span>\n\n`;
                output.innerHTML += `<span class="text-white">root:x:0:0:root:/root:/bin/bash
daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin
bin:x:2:2:bin:/bin:/usr/sbin/nologin
sys:x:3:3:sys:/dev:/usr/sbin/nologin
www-data:x:33:33:www-data:/var/www:/usr/sbin/nologin</span>`;
            }
            else if (url.startsWith('gopher://') || url.startsWith('dict://')) {
                output.innerHTML += `<span class="text-emerald-400">GOPHER PROTOCOL EXECUTED</span>\n\n`;
                output.innerHTML += `<span class="text-white">[+] Payload envoyé au service interne (ex: Redis) avec succès.</span>`;
            }
            else {
                output.innerHTML += `<span class="text-emerald-400">HTTP/1.1 200 OK</span>\n\n`;
                output.innerHTML += `<span class="text-slate-400">&lt;html&gt;Contenu public de la page...&lt;/html&gt;</span>`;
            }
        }

        function simulateSecureBackend(url, output) {
            // Le serveur sécurisé applique les filtres :
            // 1. Schéma
            // 2. Résolution DNS et IP privée
            
            try {
                const parsedUrl = new URL(url);
                
                // Protection 1 : Seuls HTTP et HTTPS sont autorisés (bloque file://, gopher://, etc.)
                if (parsedUrl.protocol !== 'http:' && parsedUrl.protocol !== 'https:') {
                    throw new Error(`[Erreur de Schéma] Le protocole '${parsedUrl.protocol}' n'est pas autorisé. Seuls http et https sont permis.`);
                }

                // Protection 2 : Blocage des adresses IP et domaines internes
                const forbiddenHostnames = ['127.0.0.1', 'localhost', '169.254.169.254', '0.0.0.0', '[::1]'];
                
                if (forbiddenHostnames.includes(parsedUrl.hostname)) {
                    throw new Error(`[Erreur Réseau] L'IP ciblée (${parsedUrl.hostname}) fait partie d'un réseau privé protégé (Zero Trust). Connexion refusée par le pare-feu applicatif.`);
                }

                // Si tout passe, on effectue la requête
                output.innerHTML += `<span class="text-emerald-400">Validation de sécurité réussie.</span>\n`;
                output.innerHTML += `<span class="text-emerald-400">HTTP/1.1 200 OK</span>\n\n`;
                output.innerHTML += `<span class="text-slate-400">&lt;html&gt;Contenu public de la page...&lt;/html&gt;</span>`;

            } catch (error) {
                // En mode sécurisé, la requête échoue explicitement avant même d'être envoyée sur le réseau
                output.innerHTML += `<span class="text-rose-500 font-bold">🚨 BLOCAGE DE SÉCURITÉ</span>\n\n`;
                output.innerHTML += `<span class="text-rose-400">${error.message}</span>`;
            }
        }

        // Initialize with a default URL
        fillUrl('http://127.0.0.1/admin/database');
    </script>
</body>
</html>
